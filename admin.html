<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malicoin Pro - Sécurisé</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --green: #00913a; --yellow: #fcd116; --red: #ce1126; --dark: #000; --gray: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--gray); border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #333; }
        .solde { font-size: 42px; color: var(--green); font-weight: bold; text-align: center; margin: 10px 0; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-main { background: var(--green); color: white; }
        .btn-admin { background: var(--yellow); color: black; }
        .qr-container { text-align: center; background: white; padding: 12px; border: 3px solid var(--yellow); border-radius: 20px; margin-bottom: 10px; display: inline-block; }
        .hidden { display: none !important; }
        h4 { margin: 0 0 10px 0; color: var(--yellow); text-transform: uppercase; font-size: 14px; }
        .hist-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 13px; }
    </style>
</head>
<body>

    <div id="auth-box" class="card">
        <h2 style="text-align:center; color: var(--yellow);">🇲🇱 MALICOIN</h2>
        <input type="tel" id="phone" placeholder="+223 XX XX XX XX">
        <div id="recaptcha-container"></div>
        <button class="btn-main" onclick="envoyerSMS()">Se connecter</button>
        <div id="code-box" class="hidden">
            <input type="password" id="sms-code" placeholder="Code SMS ou Code Secret">
            <button class="btn-admin" onclick="verifierAcces()">Entrer dans le système</button>
        </div>
    </div>

    <div id="app-box" class="hidden" style="width: 100%; max-width: 400px;">
        
        <div class="card" style="text-align:center;">
            <div id="admin-badge" class="hidden" style="background:var(--yellow); color:black; border-radius:10px; padding:5px; font-weight:bold; margin-bottom:10px;">🏛️ DIRECTION GÉNÉRALE</div>
            <div class="qr-container"><div id="qrcode"></div></div>
            <p id="display-phone" style="color:gray;"></p>
            <div class="solde"><span id="solde-val">0</span> MLC</div>
        </div>

        <div id="admin-tools" class="card hidden" style="border: 2px solid var(--yellow);">
            <h4>💎 Trésorerie</h4>
            <input type="tel" id="adm-target" placeholder="Numéro du Citoyen">
            <input type="number" id="adm-qty" placeholder="Montant à créer">
            <button class="btn-admin" onclick="emettreMonnaie()">ÉMETTRE MLC</button>
            <p style="font-size:12px; color:gray; margin-top:10px;">Commissions cumulées : <b id="revenus-total" style="color:var(--yellow)">0</b> MLC</p>
        </div>

        <div class="card">
            <h4>💸 Envoi Rapide</h4>
            <input type="tel" id="dest" placeholder="Numéro Destinataire">
            <input type="number" id="montant" placeholder="Montant à envoyer">
            <button class="btn-main" onclick="transferer()">🚀 Envoyer maintenant</button>
            <p style="text-align:center; font-size:11px; color:var(--red);">Frais prélevés : 50 MLC</p>
        </div>

        <div class="card">
            <h4>📜 Dernières Activités</h4>
            <div id="historique-list"></div>
        </div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAzhSslKnrPOsgmxtR8OTqv__QCR-5geSU",
    authDomain: "malicoin.firebaseapp.com",
    databaseURL: "https://malicoin-default-rtdb.firebaseio.com",
    projectId: "malicoin",
    storageBucket: "malicoin.appspot.com",
    messagingSenderId: "728024400418",
    appId: "1:728024400418:web:45616567fc3aa9e02a007b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
let confirmRes, isAdmin = false;
const MON_NUMERO_COMMISSION = "+22396804164"; 

window.onload = () => { window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {'size': 'invisible'}); };

function envoyerSMS() {
    const p = document.getElementById('phone').value;
    auth.signInWithPhoneNumber(p, window.recaptchaVerifier).then(res => {
        confirmRes = res; document.getElementById('code-box').classList.remove('hidden');
    }).catch(e => alert("Erreur : Vérifiez le format du numéro"));
}

function verifierAcces() {
    const code = document.getElementById('sms-code').value;
    const phone = document.getElementById('phone').value;
    if(code === "MALI2024") { isAdmin = true; startApp(phone); }
    else { confirmRes.confirm(code).then(res => startApp(res.user.phoneNumber)).catch(() => alert("Code incorrect")); }
}

function startApp(phone) {
    document.getElementById('auth-box').classList.add('hidden');
    document.getElementById('app-box').classList.remove('hidden');
    document.getElementById('display-phone').innerText = phone;
    
    if(isAdmin) {
        document.getElementById('admin-tools').classList.remove('hidden');
        document.getElementById('admin-badge').classList.remove('hidden');
    }

    db.ref('users/' + phone).on('value', s => {
        if(!s.exists()) db.ref('users/' + phone).set({solde: 500});
        else document.getElementById('solde-val').innerText = s.val().solde;
    });

    db.ref('admin/frais').on('value', s => { document.getElementById('revenus-total').innerText = s.val() || 0; });

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), { text: phone, width: 150, height: 150 });
    chargerHistorique(phone);
}

// TRANSACTION SÉCURISÉE AVEC COMMISSION
function transferer() {
    const to = document.getElementById('dest').value;
    const amt = parseInt(document.getElementById('montant').value);
    const me = document.getElementById('display-phone').innerText;
    const frais = 50;

    if(!to || isNaN(amt) || amt <= 0) return alert("Données invalides");
    if(to === me) return alert("Action impossible");

    db.ref('users/' + me + '/solde').transaction(s => {
        if(s >= (amt + frais)) {
            // Crédit Destinataire
            db.ref('users/' + to + '/solde').transaction(s2 => (s2 || 0) + amt);
            // Crédit Admin (Toi)
            db.ref('users/' + MON_NUMERO_COMMISSION + '/solde').transaction(sAdm => (sAdm || 0) + frais);
            // Compteur
            db.ref('admin/frais').transaction(f => (f || 0) + frais);
            // Log
            db.ref('transactions').push({from: me, to: to, amt: amt, date: Date.now(), type: "TRANSFERT"});
            return s - (amt + frais);
        } else {
            alert("Solde insuffisant (Frais de 50 MLC requis)");
            return;
        }
    }).then(result => {
        if(result.committed) {
            alert("✅ Envoi réussi ! 50 MLC de commission versés.");
            document.getElementById('dest').value = "";
            document.getElementById('montant').value = "";
        }
    });
}

function emettreMonnaie() {
    const t = document.getElementById('adm-target').value;
    const q = parseInt(document.getElementById('adm-qty').value);
    if(!t || isNaN(q)) return alert("Vérifiez les champs");
    db.ref('users/' + t + '/solde').transaction(c => (c || 0) + q);
    db.ref('transactions').push({from: "TRÉSOR", to: t, amt: q, date: Date.now(), type: "ÉMISSION"});
    alert("💸 MLC Créés pour " + t);
}

function chargerHistorique(phone) {
    db.ref('transactions').limitToLast(10).on('value', snap => {
        const list = document.getElementById('historique-list');
        list.innerHTML = "";
        snap.forEach(c => {
            const tx = c.val();
            if(tx.from === phone || tx.to === phone) {
                const color = tx.from === phone ? "var(--red)" : "var(--green)";
                const sign = tx.from === phone ? "-" : "+";
                list.innerHTML += `<div class="hist-item"><span style="color:${color}">${sign}${tx.amt} MLC</span> <small>${tx.type}</small></div>`;
            }
        });
    });
}
</script>
</body>
        </html>
