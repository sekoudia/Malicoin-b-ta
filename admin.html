<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malicoin Pro - Direction & Scan</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --mali-green: #00913a; --mali-yellow: #fcd116; --mali-red: #ce1126; --bg: #0f0f0f; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        .header { text-align: center; padding: 25px; background: var(--card-bg); border-radius: 20px; border-bottom: 5px solid var(--mali-yellow); margin-bottom: 20px; }
        
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #444; }
        .special { border-left-color: var(--mali-yellow); }
        
        input, select { width: 100%; padding: 15px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-ok { background: var(--mali-green); color: white; }
        .btn-gold { background: var(--mali-yellow); color: black; }
        .btn-scan { background: #3498db; color: white; }

        /* Scanner style */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: black; }
        .hidden { display: none; }
        
        .qr-wrapper { position: relative; display: inline-block; background: white; padding: 20px; border-radius: 25px; }
        .qr-center-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; background: white; border-radius: 50%; padding: 5px; border: 2px solid var(--mali-yellow); }
    </style>
</head>
<body>

    <div id="login-admin" class="header">
        <h1 style="color: var(--mali-yellow);">🏛️ DIRECTION</h1>
        <input type="password" id="admin-key" placeholder="Code secret">
        <button class="btn-gold" onclick="connexion()">Ouvrir la Trésorerie</button>
    </div>

    <div id="content-admin" class="hidden">
        <div class="header">
            <p>Solde Trésorerie (MLC)</p>
            <h1 id="mon-solde-admin" style="color: var(--mali-yellow);">0</h1>
        </div>

        <div class="card">
            <h3>📷 Scanner un Client</h3>
            <div id="reader" class="hidden"></div>
            <button id="btn-start-scan" class="btn-scan" onclick="demarrerScanner()">Activer la Caméra</button>
        </div>

        <div class="card special">
            <h3>💎 Transaction Manuelle</h3>
            <input type="tel" id="admin-dest" placeholder="Numéro du destinataire">
            <input type="number" id="admin-montant" placeholder="Montant MLC">
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-ok" onclick="actionMonnaie('transfert')">Transférer</button>
                <button class="btn-gold" onclick="actionMonnaie('emission')">Émettre</button>
            </div>
            
            <button class="btn-scan" style="margin-top:10px" onclick="genererQRDesign()">Créer QR Code de Paiement</button>
            
            <div id="qr-result" class="hidden" style="text-align: center; margin-top: 15px;">
                <div class="qr-wrapper">
                    <div id="qr-container"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>📜 Dernières Opérations</h3>
            <div id="admin-hist-list" style="font-size: 12px; max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyAzhSslKnrPOsgmxtR8OTqv__QCR-5geSU",
    authDomain: "malicoin.firebaseapp.com",
    databaseURL: "https://malicoin-default-rtdb.firebaseio.com",
    projectId: "malicoin",
    storageBucket: "malicoin.appspot.com",
    messagingSenderId: "728024400418",
    appId: "1:728024400418:web:45616567fc3aa9e02a007b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const MON_NUMERO_ADMIN = "+22396804164"; 

// --- LOGIQUE CONNEXION ---
function connexion() {
    if(document.getElementById('admin-key').value === "MALI2024") {
        document.getElementById('login-admin').style.display = 'none';
        document.getElementById('content-admin').classList.remove('hidden');
        initAdmin();
    } else { alert("Code incorrect"); }
}

// --- LOGIQUE SCANNER (LOCAL) ---
let html5QrCode;

function demarrerScanner() {
    document.getElementById('reader').classList.remove('hidden');
    document.getElementById('btn-start-scan').classList.add('hidden');
    
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            // Quand un QR est détecté
            document.getElementById('admin-dest').value = decodedText;
            alert("Client détecté : " + decodedText);
            arreterScanner();
        },
        (errorMessage) => { /* On ignore les erreurs de scan continu */ }
    ).catch(err => alert("Erreur caméra: " + err));
}

function arreterScanner() {
    if(html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('reader').classList.add('hidden');
            document.getElementById('btn-start-scan').classList.remove('hidden');
        });
    }
}

// --- LOGIQUE FINANCIÈRE ---
function initAdmin() {
    db.ref('users/' + MON_NUMERO_ADMIN + '/solde').on('value', s => {
        document.getElementById('mon-solde-admin').innerText = (s.val() || 0).toLocaleString() + " MLC";
    });
    // Chargement historique simplifié
    db.ref('transactions').limitToLast(10).on('value', snap => {
        let h = "";
        snap.forEach(c => {
            let t = c.val();
            h += `<div><b>${t.type}</b>: ${t.montant} MLC -> ${t.destinataire}</div><hr style="border:0.1px solid #333">`;
        });
        document.getElementById('admin-hist-list').innerHTML = h;
    });
}

function actionMonnaie(type) {
    const dest = document.getElementById('admin-dest').value.trim();
    const montant = parseInt(document.getElementById('admin-montant').value);
    if(!dest || isNaN(montant)) return alert("Infos manquantes");
    
    if(type === 'transfert') {
        db.ref('users/' + MON_NUMERO_ADMIN + '/solde').transaction(s => {
            if(s >= montant) {
                db.ref('users/' + dest + '/solde').transaction(sd => (sd || 0) + montant);
                sauverTransaction(dest, montant, "TRANSFERT");
                return s - montant;
            }
            alert("Solde insuffisant");
        });
    } else {
        db.ref('users/' + dest + '/solde').transaction(s => (s || 0) + montant);
        sauverTransaction(dest, montant, "EMISSION");
        alert("Émis avec succès !");
    }
}

function genererQRDesign() {
    const num = document.getElementById('admin-dest').value;
    if(!num) return alert("Entrez un numéro");
    document.getElementById('qr-result').classList.remove('hidden');
    document.getElementById('qr-container').innerHTML = "";
    new QRCode(document.getElementById("qr-container"), { text: num, width: 150, height: 150 });
}

function sauverTransaction(d, m, t) {
    db.ref('transactions').push({ destinataire: d, montant: m, type: t, date: Date.now() });
}
</script>
</body>
                </html>
