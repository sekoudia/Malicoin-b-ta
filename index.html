<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malicoin Pro - Portail Unique</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --green: #00913a; --yellow: #fcd116; --red: #ce1126; --dark: #121212; --gray: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--gray); border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #333; }
        .solde { font-size: 42px; color: var(--green); font-weight: bold; text-align: center; margin: 10px 0; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-main { background: var(--green); color: white; }
        .btn-admin { background: var(--yellow); color: black; }
        .qr-container { text-align: center; position: relative; display: inline-block; background: white; padding: 10px; border: 3px solid var(--yellow); border-radius: 15px; margin-bottom: 10px; }
        .qr-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; background: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .hist-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .chat-box { height: 120px; overflow-y: auto; background: #252525; padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        h4 { margin-top: 0; color: var(--yellow); text-transform: uppercase; font-size: 14px; }
        .badge-frais { color: var(--red); font-size: 11px; font-weight: bold; }
        .admin-tag { background: var(--yellow); color: black; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-box" class="card">
        <h2 style="text-align:center">🇲🇱 MALICOIN</h2>
        <input type="tel" id="phone" placeholder="Numéro de téléphone">
        <div id="recaptcha-container"></div>
        <button class="btn-main" onclick="envoyerSMS()">Se connecter</button>
        
        <div id="code-box" class="hidden">
            <input type="text" id="sms-code" placeholder="Code SMS ou Code Admin">
            <button class="btn-admin" onclick="verifierAcces()">Entrer dans Malicoin</button>
        </div>
    </div>

    <div id="app-box" class="hidden" style="width: 100%; max-width: 400px;">
        
        <div class="card" style="text-align:center;">
            <div id="admin-indicator" class="hidden"><span class="admin-tag">MODE ADMINISTRATEUR</span></div>
            <div id="qr-area" class="qr-container">
                <div id="qrcode"></div>
                <div class="qr-logo">🐫</div>
            </div>
            <p id="display-phone" style="color:gray; margin: 5px 0;"></p>
            <div class="solde"><span id="solde-val">0</span> <small style="font-size:15px">MLC</small></div>
        </div>

        <div id="admin-section" class="card hidden" style="border: 2px solid var(--yellow);">
            <h4>💎 Trésorerie (MALI2024)</h4>
            <input type="tel" id="num-citoyen" placeholder="Numéro du Citoyen">
            <input type="number" id="montant-emission" placeholder="Montant MLC à émettre">
            <button class="btn-admin" onclick="emettreMalicoin()">ÉMETTRE MONNAIE</button>
            <p style="font-size:12px; color:gray; margin-top:10px;">Revenus Frais : <b id="total-frais" style="color:var(--yellow)">0</b> MLC</p>
        </div>

        <div class="card">
            <h4>💸 Transfert & Chat</h4>
            <input type="tel" id="dest" placeholder="Destinataire">
            <input type="number" id="montant" placeholder="Montant MLC">
            <button class="btn-main" onclick="initierPaiement()">🚀 Payer (Biométrie)</button>
            <center><span class="badge-frais">Frais de service : 50 MLC</span></center>
            
            <div id="chat-content" class="chat-box" style="margin-top:15px;">Discussion...</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-msg" placeholder="Message..." style="margin:0;">
                <button onclick="envoyerMessage()" style="width:80px; margin:0; background:var(--yellow); color:black;">ENVOYER</button>
            </div>
        </div>

        <div class="card">
            <h4>📜 Historique</h4>
            <div id="historique-list"></div>
        </div>
    </div>

<script>
// CONFIG FIREBASE (IDENTIQUE)
const firebaseConfig = {
    apiKey: "AIzaSyAzhSslKnrPOsgmxtR8OTqv__QCR-5geSU",
    authDomain: "malicoin.firebaseapp.com",
    databaseURL: "https://malicoin-default-rtdb.firebaseio.com",
    projectId: "malicoin",
    storageBucket: "malicoin.appspot.com",
    messagingSenderId: "728024400418",
    appId: "1:728024400418:web:45616567fc3aa9e02a007b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
let confirmRes;
let isAdmin = false;

window.onload = () => { window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {'size': 'invisible'}); };

function envoyerSMS() {
    const p = document.getElementById('phone').value;
    if(!p) return alert("Entrez un numéro");
    auth.signInWithPhoneNumber(p, window.recaptchaVerifier).then(res => {
        confirmRes = res; 
        document.getElementById('code-box').classList.remove('hidden');
    }).catch(err => alert("Erreur SMS: " + err.message));
}

// GESTIONNAIRE D'ACCÈS (USER vs ADMIN)
function verifierAcces() {
    const codeEntré = document.getElementById('sms-code').value;
    const phone = document.getElementById('phone').value;

    if (codeEntré === "MALI2024") {
        isAdmin = true;
        alert("Accès Administrateur Activé");
        startApp(phone); // On bypass le SMS pour l'admin
    } else {
        confirmRes.confirm(codeEntré).then(res => {
            startApp(res.user.phoneNumber);
        }).catch(() => alert("Code incorrect"));
    }
}

function startApp(phone) {
    document.getElementById('auth-box').classList.add('hidden');
    document.getElementById('app-box').classList.remove('hidden');
    document.getElementById('display-phone').innerText = phone;
    
    // Si c'est l'admin, on montre la section secrète
    if(isAdmin) {
        document.getElementById('admin-section').classList.remove('hidden');
        document.getElementById('admin-indicator').classList.remove('hidden');
    }

    db.ref('users/' + phone).on('value', s => {
        if(!s.exists()) db.ref('users/' + phone).set({solde: 500});
        else document.getElementById('solde-val').innerText = s.val().solde;
    });

    db.ref('admin/frais').on('value', s => { 
        document.getElementById('total-frais').innerText = s.val() || 0; 
    });

    chargerHistorique(phone);
    new QRCode(document.getElementById("qrcode"), { text: phone, width: 160, height: 160 });
}

// FONCTIONS TRANSACTIONNELLES
async function initierPaiement() {
    if (window.confirm("Valider la transaction par empreinte ?")) transferer();
}

function transferer() {
    const to = document.getElementById('dest').value;
    const amt = parseInt(document.getElementById('montant').value);
    const me = document.getElementById('display-phone').innerText;
    const frais = 50;

    if(!to || isNaN(amt)) return alert("Vérifiez les champs");

    db.ref('users/' + me + '/solde').transaction(s => {
        if(s >= (amt + frais)) {
            db.ref('users/' + to + '/solde').transaction(s2 => (s2 || 0) + amt);
            db.ref('transactions').push({from: me, to: to, amt: amt, date: Date.now(), type: "TRANSFERT"});
            db.ref('admin/frais').transaction(f => (f || 0) + frais);
            return s - (amt + frais);
        } else { alert("Solde insuffisant"); }
    });
}

function emettreMalicoin() {
    const citoyen = document.getElementById('num-citoyen').value;
    const montant = parseInt(document.getElementById('montant-emission').value);
    if(!citoyen || isNaN(montant)) return;

    db.ref('users/' + citoyen + '/solde').transaction(s => (s || 0) + montant);
    db.ref('transactions').push({from: "TRÉSOR", to: citoyen, amt: montant, date: Date.now(), type: "EMISSION"});
    alert("Monnaie émise avec succès !");
}

function chargerHistorique(phone) {
    db.ref('transactions').limitToLast(10).on('value', snap => {
        const list = document.getElementById('historique-list');
        list.innerHTML = "";
        snap.forEach(c => {
            const tx = c.val();
            if(tx.from === phone || tx.to === phone) {
                const color = tx.from === phone ? "var(--red)" : "var(--green)";
                const signe = tx.from === phone ? "-" : "+";
                list.innerHTML += `<div class="hist-item"><span style="color:${color}">${signe}${tx.amt} MLC</span> <small>${tx.type}</small></div>`;
            }
        });
    });
}

function envoyerMessage() {
    const to = document.getElementById('dest').value;
    const msg = document.getElementById('chat-msg').value;
    const me = document.getElementById('display-phone').innerText;
    if(!to || !msg) return;
    const chatId = me < to ? me + "_" + to : to + "_" + me;
    db.ref('chats/' + chatId).push({ sender: me, text: msg });
    document.getElementById('chat-msg').value = "";
    
    db.ref('chats/' + chatId).limitToLast(5).on('value', snap => {
        const box = document.getElementById('chat-content');
        box.innerHTML = "";
        snap.forEach(m => { box.innerHTML += `<div><b>${m.val().sender.slice(-4)}:</b> ${m.val().text}</div>`; });
    });
}
</script>
</body>
        </html>
