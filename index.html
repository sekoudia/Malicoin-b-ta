<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malicoin Ecosystem - Bonus Inclus</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --mali-green: #00913a; --mali-yellow: #fcd116; --mali-red: #ce1126; --bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        .login-box { text-align: center; padding: 50px 20px; background: var(--card-bg); border-radius: 25px; border-bottom: 5px solid var(--mali-yellow); margin-top: 50px; }
        .header { text-align: center; padding: 20px; background: linear-gradient(145deg, #1e1e1e, #111); border-radius: 20px; margin-bottom: 20px; border-bottom: 3px solid var(--mali-yellow); }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .special { border-left: 5px solid var(--mali-yellow); }
        
        input { width: 100%; padding: 15px; background: #252525; border: 1px solid #444; color: white; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        
        .btn-main { background: var(--mali-yellow); color: black; }
        .btn-green { background: var(--mali-green); color: white; }
        .btn-scan { background: #3498db; color: white; }

        .hidden { display: none; }
        #reader-admin, #reader-user { width: 100%; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .qr-display { background: white; padding: 15px; border-radius: 15px; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <h1 style="color: var(--mali-yellow); letter-spacing: 2px;">MALICOIN</h1>
        <p>Entrez votre numéro ou code secret</p>
        <input type="password" id="access-key" placeholder="Numéro ou Code Direction">
        <button class="btn-main" onclick="verifierAcces()">Ouvrir mon Espace</button>
        <p style="font-size: 12px; color: var(--mali-green);">Nouveau ? Recevez 5 000 MLC à l'inscription !</p>
    </div>

    <div id="ui-admin" class="hidden">
        <div class="header">
            <h2 style="color: var(--mali-yellow);">🏛️ DIRECTION GÉNÉRALE</h2>
            <div style="font-size: 2em;" id="admin-balance">0 MLC</div>
        </div>
        
        <div class="card special">
            <h3>💎 Émission & Gestion</h3>
            <input type="tel" id="adm-dest" placeholder="Numéro destinataire">
            <input type="number" id="adm-amount" placeholder="Montant MLC">
            <div style="display: flex; gap: 10px;">
                <button class="btn-green" onclick="transferer('admin', 'transfert')">Transférer</button>
                <button class="btn-main" onclick="transferer('admin', 'emission')">Émettre</button>
            </div>
        </div>

        <div class="card">
            <h3>📷 Scanner un Client</h3>
            <div id="reader-admin" class="hidden"></div>
            <button class="btn-scan" id="btn-scan-adm" onclick="startScan('admin')">Ouvrir Caméra</button>
        </div>
    </div>

    <div id="ui-user" class="hidden">
        <div class="header">
            <h2 id="user-phone-display">Mon Portefeuille</h2>
            <div style="font-size: 2.5em; color: var(--mali-green);" id="user-balance">0 MLC</div>
        </div>

        <div class="card">
            <button class="btn-scan" id="btn-scan-usr" onclick="startScan('user')">📷 SCANNER POUR PAYER</button>
            <div id="reader-user" class="hidden"></div>
            <input type="tel" id="user-dest" placeholder="Numéro du destinataire">
            <input type="number" id="user-amount" placeholder="Montant à envoyer">
            <button class="btn-green" onclick="transferer('user', 'transfert')">Envoyer mes MLC</button>
        </div>

        <div class="card" style="text-align: center;">
            <h3>📥 Mon QR Code</h3>
            <div id="user-qr" class="qr-display"></div>
            <p style="font-size: 12px; margin-top:10px; color:#888;">Faites scanner ce code pour recevoir de l'argent</p>
        </div>
    </div>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyAzhSslKnrPOsgmxtR8OTqv__QCR-5geSU",
    authDomain: "malicoin.firebaseapp.com",
    databaseURL: "https://malicoin-default-rtdb.firebaseio.com",
    projectId: "malicoin",
    storageBucket: "malicoin.appspot.com",
    messagingSenderId: "728024400418",
    appId: "1:728024400418:web:45616567fc3aa9e02a007b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CODE_DIRECTION = "MALI2024";
const NUMERO_TRESOR = "+22396804164"; 
const BONUS_BIENVENUE = 5000;
let sessionUser = "";
let scanner = null;

// --- LOGIQUE D'ACCÈS ET BONUS ---
function verifierAcces() {
    const key = document.getElementById('access-key').value.trim();
    if(!key) return alert("Veuillez entrer un numéro ou code");

    document.getElementById('login-screen').classList.add('hidden');

    if(key === CODE_DIRECTION) {
        sessionUser = NUMERO_TRESOR;
        document.getElementById('ui-admin').classList.remove('hidden');
        ecouterSolde(NUMERO_TRESOR, 'admin-balance');
    } else {
        sessionUser = key;
        document.getElementById('ui-user').classList.remove('hidden');
        document.getElementById('user-phone-display').innerText = "Compte: " + key;

        // VERIFICATION / ATTRIBUTION DU BONUS DE 5000 MLC
        const soldeRef = db.ref('users/' + key + '/solde');
        soldeRef.get().then((snap) => {
            if (!snap.exists()) {
                // C'est un nouveau compte
                soldeRef.set(BONUS_BIENVENUE);
                sauverLog(key, BONUS_BIENVENUE, "CADEAU_BIENVENUE");
                alert("🎁 Bienvenue ! 5 000 MLC vous ont été offerts !");
            }
        });

        ecouterSolde(key, 'user-balance');
        document.getElementById('user-qr').innerHTML = "";
        new QRCode(document.getElementById("user-qr"), { text: key, width: 150, height: 150 });
    }
}

function ecouterSolde(num, elementId) {
    db.ref('users/' + num + '/solde').on('value', s => {
        document.getElementById(elementId).innerText = (s.val() || 0).toLocaleString() + " MLC";
    });
}

// --- SYSTÈME DE SCANNER ---
function startScan(mode) {
    const readerId = mode === 'admin' ? "reader-admin" : "reader-user";
    const inputId = mode === 'admin' ? "adm-dest" : "user-dest";
    
    document.getElementById(readerId).classList.remove('hidden');
    scanner = new Html5Qrcode(readerId);
    
    scanner.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 }, 
        (text) => {
            document.getElementById(inputId).value = text;
            scanner.stop();
            document.getElementById(readerId).classList.add('hidden');
            alert("Numéro récupéré : " + text);
        }
    ).catch(err => alert("Erreur caméra : " + err));
}

// --- TRANSACTIONS ---
function transferer(role, type) {
    const dest = document.getElementById(role === 'admin' ? 'adm-dest' : 'user-dest').value.trim();
    const montant = parseInt(document.getElementById(role === 'admin' ? 'adm-amount' : 'user-amount').value);

    if(!dest || isNaN(montant) || montant <= 0) return alert("Veuillez remplir correctement les champs.");

    if(type === 'emission' && role === 'admin') {
        db.ref('users/' + dest + '/solde').transaction(s => (s || 0) + montant);
        sauverLog(dest, montant, "EMISSION");
        alert("Émission de " + montant + " MLC réussie !");
    } else {
        db.ref('users/' + sessionUser + '/solde').transaction(soldeActuel => {
            if(soldeActuel >= montant) {
                db.ref('users/' + dest + '/solde').transaction(s => (s || 0) + montant);
                sauverLog(dest, montant, "TRANSFERT");
                alert("Envoi de " + montant + " MLC terminé !");
                return soldeActuel - montant;
            } else {
                alert("Solde insuffisant pour cette transaction.");
                return;
            }
        });
    }
}

function sauverLog(d, m, t) {
    db.ref('transactions').push({ 
        from: sessionUser, 
        to: d, 
        montant: m, 
        type: t, 
        date: Date.now() 
    });
}
</script>
</body>
            </html>
